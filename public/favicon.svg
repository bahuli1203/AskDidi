<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Brand gradient: pink → rose → purple, same as app -->
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- Soft petal gradient: white → blush pink -->
    <radialGradient id="petal" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#fff5fa"/>
      <stop offset="100%" stop-color="#ffd6e5"/>
    </radialGradient>

    <!-- Glow at the center -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- One sakura petal — teardrop with notched tip -->
    <path id="p"
      d="M0 -22
         C 7 -22  11 -16  11 -10
         C 11 -4   7  0   2  1
         C  3 -1   3 -3   1 -4
         C -1 -3  -1 -1   0  1
         C -2  0  -7 -4  -7 -10
         C -7 -16 -7 -22  0 -22 Z"
      fill="url(#petal)"
      stroke="#f9a8c4"
      stroke-width="0.6"
      stroke-linejoin="round"/>
  </defs>

  <!-- Rounded square brand background -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Soft inner glow -->
  <circle cx="32" cy="32" r="22" fill="url(#glow)"/>

  <!-- 5-petal sakura, rotated around center -->
  <g transform="translate(32 32)">
    <use href="#p" transform="rotate(0)"/>
    <use href="#p" transform="rotate(72)"/>
    <use href="#p" transform="rotate(144)"/>
    <use href="#p" transform="rotate(216)"/>
    <use href="#p" transform="rotate(288)"/>

    <!-- Stamen / golden center -->
    <circle r="3.6" fill="#fde68a"/>
    <circle r="2" fill="#f59e0b"/>

    <!-- Tiny stamen dots -->
    <g fill="#f59e0b">
      <circle cx="0"   cy="-3" r="0.6"/>
      <circle cx="2.8" cy="-1" r="0.6"/>
      <circle cx="1.7" cy="2.4" r="0.6"/>
      <circle cx="-1.7" cy="2.4" r="0.6"/>
      <circle cx="-2.8" cy="-1" r="0.6"/>
    </g>
  </g>
</svg>
